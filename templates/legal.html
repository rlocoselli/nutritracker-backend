{% extends "base.html" %}

{% block title %}NutriTracker - Legal{% endblock %}

{% block body_attributes %}data-page="{{ page_type }}"{% endblock %}

{% block styles %}
    <style>
      :root {
        --panel: #ffffff;
        --text: #1b2a1f;
        --muted: #5d6f62;
        --primary: #4ea84e;
        --line: #dce8d8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #f4f8f2 0%, #eff5ec 40%, #f6f8f3 100%);
      }

      .container {
        width: min(1000px, 92%);
        margin: 0 auto;
      }

      .topbar {
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 0;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .back {
        text-decoration: none;
        color: #fff;
        background: var(--primary);
        padding: 10px 14px;
        border-radius: 8px;
        font-weight: 600;
      }

      select {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
      }

      .card {
        margin: 28px 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 26px rgba(43, 75, 43, 0.08);
      }

      h1 { margin: 0 0 10px; }
      p, li { color: var(--muted); line-height: 1.6; }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin: 14px 0 8px;
      }

      .chip {
        background: #f6fbf4;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
      }

      .donation-box {
        margin-top: 20px;
        background: #f6fbf4;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }

      .donation-box h3 {
        margin: 0 0 8px;
      }

      .donate-btn {
        display: inline-block;
        margin-top: 8px;
        text-decoration: none;
        color: #fff;
        background: var(--primary);
        padding: 10px 14px;
        border-radius: 8px;
        font-weight: 700;
      }

      .donate-note {
        margin-top: 10px;
        font-size: 0.92rem;
      }

      footer {
        border-top: 1px solid var(--line);
        padding: 16px 0 24px;
        color: var(--muted);
      }

      @media (max-width: 700px) {
        .meta { grid-template-columns: 1fr; }
      }
    </style>
  {% endblock %}

  {% block body %}
    <header class="topbar">
      <div class="container topbar-inner">
        <strong>NutriTracker</strong>
        <div class="actions">
          <a class="back" href="/" data-i18n="common.back"></a>
          <select id="lang-select" aria-label="Language">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="pt">Português</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="ro">Română</option>
            <option value="la">Latina</option>
          </select>
        </div>
      </div>
    </header>

    <main class="container">
      <article class="card">
        <h1 data-i18n="page.title"></h1>
        <p data-i18n="page.intro"></p>

        <div class="meta">
          <div class="chip" data-i18n="page.meta1"></div>
          <div class="chip" data-i18n="page.meta2"></div>
        </div>

        <h2 data-i18n="page.section1Title"></h2>
        <ul>
          <li data-i18n="page.s1a"></li>
          <li data-i18n="page.s1b"></li>
          <li data-i18n="page.s1c"></li>
        </ul>

        <h2 data-i18n="page.section2Title"></h2>
        <ul>
          <li data-i18n="page.s2a"></li>
          <li data-i18n="page.s2b"></li>
          <li data-i18n="page.s2c"></li>
        </ul>

        <h2 data-i18n="page.section3Title"></h2>
        <ul>
          <li data-i18n="page.s3a"></li>
          <li data-i18n="page.s3b"></li>
          <li data-i18n="page.s3c"></li>
        </ul>

        <section id="donation-box" class="donation-box" hidden>
          <h3 data-i18n="page.donateTitle"></h3>
          <p data-i18n="page.donateDesc"></p>
          <a class="donate-btn" href="https://www.paypal.com/donate/?business=rlocoselli%40yahoo.com.br" target="_blank" rel="noopener noreferrer" data-i18n="page.donateCta"></a>
          <p class="donate-note" data-i18n="page.donateLegal"></p>
        </section>
      </article>
    </main>

    <footer>
      <div class="container" data-i18n="common.footer"></div>
    </footer>

  {% endblock %}

      function setText(key, value) {
        document.querySelectorAll(`[data-i18n="${key}"]`).forEach((node) => {
          node.textContent = value.replaceAll("privacy@nutritracker.app", "support@nutritiontracker.fr");
        });
      }

      function applyLanguage(lang) {
        const selected = content[lang] ? lang : "fr";
        const dictionary = content[selected];
        const pageData = dictionary[pageType] || dictionary.privacy;
        const donationBox = document.getElementById("donation-box");

        document.documentElement.lang = selected;
        Object.entries(dictionary.common).forEach(([k, v]) => setText(`common.${k}`, v));
        Object.entries(pageData).forEach(([k, v]) => setText(`page.${k}`, v));
        if (donationBox) {
          donationBox.hidden = pageType !== "impact";
        }
        if (window.NutriCookieBanner?.setLanguage) {
          window.NutriCookieBanner.setLanguage(selected);
        }
        localStorage.setItem("lang", selected);
      }

      const select = document.getElementById("lang-select");
      const browserLang = (navigator.language || "fr").slice(0, 2).toLowerCase();
      const initialLang = localStorage.getItem("lang") || (content[browserLang] ? browserLang : "fr");
      select.value = initialLang;
      applyLanguage(initialLang);

      select.addEventListener("change", (event) => applyLanguage(event.target.value));
